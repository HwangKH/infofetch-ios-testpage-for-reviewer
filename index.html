<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Briefing</title>
    <style>
        :root {
            --bg: #f3efe6;
            --paper: rgba(255, 252, 246, 0.88);
            --ink: #14213d;
            --muted: #667085;
            --line: rgba(20, 33, 61, 0.12);
            --accent: #d97706;
            --accent-strong: #b45309;
            --sky: #9ec5fe;
            --good: #1f7a4d;
            --shadow: 0 24px 60px rgba(20, 33, 61, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 32%),
                linear-gradient(160deg, #efe8dc 0%, #e8edf6 54%, #dce6f3 100%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .shell {
            width: min(1200px, calc(100vw - 32px));
            margin: 24px auto 48px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            background:
                linear-gradient(135deg, rgba(20, 33, 61, 0.94), rgba(40, 60, 103, 0.9)),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent);
            color: #fdfcf8;
            box-shadow: var(--shadow);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -10% -30% auto;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.35), transparent 68%);
        }

        .hero-top,
        .hero-bottom,
        .grid,
        .info-row,
        .pill-row,
        .crew-list,
        .duty-summary,
        .link-list {
            display: grid;
            gap: 16px;
        }

        .hero-top {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            align-items: start;
            position: relative;
            z-index: 1;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(253, 252, 248, 0.72);
        }

        .route-code {
            margin-top: 10px;
            font-size: clamp(42px, 8vw, 88px);
            line-height: 0.92;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .route-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .reviewer-hint {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.01em;
            color: #fff8e8;
            background: rgba(217, 119, 6, 0.18);
            border: 1px solid rgba(255, 241, 214, 0.3);
            box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
            animation: pulseHint 1.6s ease-in-out infinite;
        }

        .reviewer-hint::before,
        .reviewer-hint::after {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffd166;
            box-shadow: 0 0 12px rgba(255, 209, 102, 0.95);
        }

        .reviewer-hint.top {
            margin-top: 12px;
        }

        .reviewer-hint.bottom {
            margin-top: 12px;
            margin-bottom: -2px;
        }

        .route-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .route-head-main {
            min-width: 0;
        }

        .btn-icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            min-width: 10rem;
            width: 10rem;
            padding-top: 8px;
            flex: 0 0 auto;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .btn-check {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .hero-chip,
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .hero-chip {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .hero-aside {
            justify-self: end;
            width: min(360px, 100%);
            padding: 20px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(10px);
        }

        .hero-aside h2,
        .section h3 {
            margin: 0;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 14px;
        }

        .stat-line:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .hero-bottom {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            margin-top: 22px;
            position: relative;
            z-index: 1;
        }

        .timeline-card {
            padding: 16px 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .timeline-card strong {
            display: block;
            margin-top: 6px;
            font-size: 24px;
            letter-spacing: -0.03em;
        }

        .timeline-card span {
            font-size: 12px;
            color: rgba(253, 252, 248, 0.72);
        }

        .grid {
            grid-template-columns: 1.2fr 0.8fr;
            margin-top: 22px;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .section {
            padding: 22px;
            border-radius: 24px;
            background: var(--paper);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .section-note {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }

        .info-row {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .info-card {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .value {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .subvalue {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .pill-row {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .chip {
            justify-content: center;
            background: rgba(20, 33, 61, 0.06);
            border: 1px solid var(--line);
            color: var(--ink);
        }

        .chip.good {
            color: var(--good);
            border-color: rgba(31, 122, 77, 0.2);
            background: rgba(31, 122, 77, 0.08);
        }

        .crew-list,
        .link-list {
            grid-template-columns: 1fr;
        }

        .crew-item,
        .link-item {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--line);
        }

        .crew-item strong,
        .link-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .muted {
            color: var(--muted);
        }

        .duty-summary {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .summary-box,
        .comment-box {
            padding: 16px;
            border-radius: 18px;
            background: rgba(20, 33, 61, 0.04);
            border: 1px solid var(--line);
        }

        .summary-box pre,
        .comment-box p {
            margin: 0;
            white-space: pre-wrap;
            font-family: inherit;
            line-height: 1.5;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: rgba(217, 119, 6, 0.12);
            color: var(--accent-strong);
        }

        .link-item span:last-child {
            align-self: center;
            color: var(--accent-strong);
            font-weight: 800;
        }

        @keyframes pulseHint {
            0%,
            100% {
                transform: translateY(0);
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.16);
                opacity: 0.92;
            }
            50% {
                transform: translateY(-2px);
                box-shadow: 0 0 0 12px rgba(245, 158, 11, 0);
                opacity: 1;
            }
        }

        .dom-probe {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            clip-path: inset(50%);
            border: 0;
            white-space: nowrap;
        }

        @media (max-width: 980px) {
            .hero-top,
            .grid,
            .hero-bottom,
            .info-row,
            .pill-row,
            .duty-summary {
                grid-template-columns: 1fr;
            }

            .hero-aside {
                justify-self: stretch;
            }

            .route-head {
                flex-direction: column;
            }

            .btn-icon-wrap {
                justify-content: flex-start;
                padding-top: 0;
            }
        }
    </style>

    <script>
        function formatCodeshares(items) {
            return items.map((item) => `${item.carr_cd}${item.flt_no}`).join(" · ");
        }

        function formatCrewList(crew) {
            return crew.slice(1).map((item) => {
                const duty = [item.duty_cd, item.jump_cd].filter(Boolean).join(" ");
                return {
                    duty,
                    name: item.kornm_n,
                    meta: `${item.alias_cd}${item.prmt_yr} / TEAM ${item.team_cd}`
                };
            });
        }

        function buildDutySummary(data) {
            return [
                `ANN: ${data.annc_cabin_staff_name || "-"}`,
                `Sales: ${[data.sale_mjr_staff_name, data.sale_jnr_staff_name].filter(Boolean).join(", ") || "-"}`,
                `TASER: ${[data.taser_mjr_staff_name, data.taser_jnr_staff_name].filter(Boolean).join(", ") || "-"}`,
                `SealCHK: ${[data.meal_seal_staff_name_f, data.meal_seal_staff_name_c, data.meal_seal_staff_name_y].filter(Boolean).join(", ") || "-"}`,
                `YmealSurvey: ${data.y_cls_meal_survey || "-"}`,
                `B/PassCHK: ${data.headcount_staff_name || "-"}`,
                `L2standBy: ${data.l2_stby_staff_name || "-"}`
            ].join("\n");
        }

            const crewList = formatCrewList(source.data.duty_assignment_crew);

                { label: "Station Brief", url: source.data.brf_link_stn },

                                <div class="stat-line"><span>Internet</span><strong>${source.achl_mgmt.inet_y === "Y" ? "Available" : "Unavailable"}</strong></div>

                                    <h3>Crew Assignment</h3>
                                    <span class="section-note">${source.data.aircc_duty_cd}</span>
                                </div>
                                <div class="crew-list">
                                    <article class="crew-item">
                                        <div>
                                            <strong>DP ${source.duty_assignment.first.staff_name}</strong>
                                            <div class="muted">${source.duty_assignment.first.kornm_n} / ${source.duty_assignment.first.staff_num}</div>
                                        </div>
                                        <div class="muted">${source.duty_assignment.first.alias_cd}${source.duty_assignment.first.prmt_yr} / ${source.duty_assignment.first.team_cd}</div>
                                    </article>
                                    ${crewList.map((item) => `
                                        <article class="crew-item">
                                            <div>
                                                <strong>${item.duty}</strong>
                                                <div class="muted">${item.name}</div>
                                            </div>
                                            <div class="muted">${item.meta}</div>
                                        </article>
                                    `).join("")}
                                </div>
                            </section>
                        </div>

                        <div class="stack">
                            <section class="section">
                                <div class="section-head">
                                    <h3>Purser Comment</h3>
                                    <span class="tag">Priority</span>
                                </div>
                                <div class="comment-box">
                                    <p>${purser.remarks_txt}</p>
                                </div>
                                <div class="comment-box" style="margin-top: 12px;">
                                    <p>${purser.delay_remarks_txt}</p>
                                </div>
                            </section>

                            <section class="section">
                                <div class="section-head">
                                    <h3>Duty Summary</h3>
                                    <span class="section-note">Role allocation</span>
                                </div>
                                <div class="duty-summary">
                                    <div class="summary-box">
                                        <pre>${buildDutySummary(purser)}</pre>
                                    </div>
                                    <div class="summary-box">
                                        <pre>${JSON.stringify(source.service_procedure, null, 2)}</pre>
                                    </div>
                                </div>
                            </section>

                            <section class="section">
                                <div class="section-head">
                                    <h3>Service & Links</h3>
                                    <span class="section-note">Briefing assets</span>
                                </div>
                                <div class="crew-list">
                                    <article class="crew-item">
                                        <div>
                                            <strong>Meal</strong>
                                            <div class="muted">${source.service_meal.map((item) => `${item.code} ${item.name}`).join(", ")}</div>
                                        </div>
                                    </article>
                                    <article class="crew-item">
                                        <div>
                                            <strong>Wine</strong>
                                            <div class="muted">${source.service_wine.map((item) => `${item.class} ${item.name}`).join(", ")}</div>
                                        </div>
                                    </article>
                                </div>
                                <div class="link-list" style="margin-top: 14px;">
                                    ${links.map((item) => `
                                        <a class="link-item" href="${item.url}" target="_blank" rel="noreferrer">
                                            <div>
                                                <strong>${item.label}</strong>
                                                <div class="muted">${item.url}</div>
                                            </div>
                                            <span>Open</span>
                                        </a>
                                    `).join("")}
                                </div>
                            </section>
                        </div>
                    </section>
                </main>
            `;
        }

        document.addEventListener("DOMContentLoaded", renderPage);
    </script>
</head>
<body>
    <div class="dom-probe">
        <a class="dutylist-link" href="#">DUTY ASSIGNMENT</a>
        <div class="line-break">RETURN FLIGHT EXISTS</div>
    </div>
</body>
</html>
